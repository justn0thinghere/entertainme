<!DOCTYPE html>
<html>

<head>
    <title>EntertainMe Watchlist</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <!-- Nav bar -->
    <nav class="navbar navbar-expand-lg custom-navbar">
        <div class="container">

            <!-- LOGO -->
            <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
                <span class="logo-icon">🎬</span>
                <span class="logo-text">EntertainMe</span>
            </a>

            <!-- MENU -->
            <div class="collapse navbar-collapse justify-content-center">
                <ul class="navbar-nav">

                    <li class="nav-item">
                        <a class="nav-link" href="home.html">
                            <i class="bi bi-house"></i>
                            <span>Home</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="search.html">
                            <i class="bi bi-search"></i>
                            <span>Search</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link active" href="watchlist.html">
                            <i class="bi bi-bookmark"></i>
                            <span>Watchlist</span>
                        </a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="profile.html">
                            <i class="bi bi-person"></i>
                            <span>Profile</span>
                        </a>
                    </li>

                </ul>
            </div>

            <!-- LOGOUT -->
            <button class="btn btn-logout"><i class="bi bi-box-arrow-right"></i> Logout</button>

        </div>
    </nav> <!-- end of nav -->

    <!-- Main content -->

    <div class="container py-4">
        <!-- Watchlist Header -->
       <div class="watchlist-header mb-4">
            <div class="d-flex align-items-center gap-3">
            <i class="bi bi-bookmark fs-3 bookmark-watchlist"></i>
            <h2 class="fw-bold mb-0">My Watchlist</h2>
            </div>
                 <p class="text-muted mt-1" id="watchlist-count">0 items saved</p>
        </div>

         <!-- Filter Tabs -->
        <div class="WL-FilterSlider mb-4">
            <div class="WL-filtercontainer active d-flex align-items-center gap-2" data-type="all">
                <i class="bi bi-grid-fill"></i> All
            </div>
            <div class="WL-filtercontainer d-flex align-items-center gap-2" data-type="movie">
                <i class="bi bi-film"></i> Movies 
            </div>
            <div class="WL-filtercontainer d-flex align-items-center gap-2" data-type="music">
                <i class="bi bi-music-note"></i> Music 
            </div>
            <div class="WL-filtercontainer d-flex align-items-center gap-2" data-type="book">
                <i class="bi bi-book"></i> Books
            </div>
        </div>

        

        <!-- Watchlist Cards -->
        <div id="watchlist-container" class="row g-4">
        <!-- Cards inserted by JS -->
        </div>

        </div>
       
    


    <script src="js/watchlist.js"></script>
</body>

</html>
